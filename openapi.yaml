          items:
            $ref: '#/components/schemas/UserDetailed'
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationDetailed'
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    Organization:
