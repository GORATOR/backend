      properties:
        name:
          type: string
        avatar:
          type: string
        active:
          type: boolean
    OrganizationInput:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        avatar:
          type: string
        teamIds:
          type: array
          items:
            type: integer
            minimum: 1
        userIds:
          type: array
          items:
            type: integer
            minimum: 1
    OrganizationDetailed:
      type: object
      properties:
        name:
          type: string
        avatar:
          type: string
        active:
          type: boolean
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        teams:
          type: array
          items:
            $ref: '#/components/schemas/Team'
    Envelopes:
      type: array
      items:
        $ref: '#/components/schemas/Envelope'
    EnvelopeEventExtra:
      type: object
      properties:
        Data:
          type: string
        EnvelopeEventCommonID:
          type: integer
    EnvelopeSDK:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
    Envelope:
      type: object
