components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
  schemas:
    stringQueryParam:
      type: string
      description: schema for string parameter in url
    numberQueryParam:
      type: number
      description: schema for number parameter in url
    EntityCountResponse:
      type: object
      properties:
        entity:
          type: string
        count:
          type: number
    UserInput:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        avatar:
          type: string
        active:
          type: boolean
        password:
          type: string
        teamIds:
          type: array
          items:
            type: integer
            minimum: 1
        organizationIds:
          type: array
          items:
            type: integer
            minimum: 1
    User:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        avatar:
          type: string
        password:
          type: string
        active:
          type: boolean
    Project:
      type: object
      properties:
        name:
          type: string
        teamId:
          type: number
        avatar:
          type: string
        active: 
          type: boolean
        envelopeKey:
          type: string
        createdBy:
          type: number
    ProjectInput:
      type: object
      properties:
        name:
          type: string
        teamId:
          type: number
        avatar:
          type: string
    UserDetailed:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        avatar:
          type: string
        password:
          type: string
        active:
          type: boolean
        teams:
